default:
  tags:
    - flarenetwork-lg

variables:
  GOLANG_VERSION: "1.25.1"
  GOLINT_VERSION: "v2.7.0"
  COVERAGE_FILE: "coverage.out"
  COBERTURA_FILE: "coverage.xml"
  RUNNER_BASE_TAG: "flarenetwork"

.gocache:
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go
  before_script:
    - mkdir -p ${GOPATH}
  cache:
    paths:
      - ${GOPATH}/pkg/mod/
      - ${GOPATH}/bin

stages:
  - build
  - test
  - release-images

.rules:default:
  rules:
    - if: $CI_COMMIT_TAG

build:
  stage: build
  image: golang:${GOLANG_VERSION}
  extends: .gocache
  needs: []
  script:
    - go mod download
    - go build ./cmd/main.go

lint:
  stage: test
  needs: [build]
  image: golangci/golangci-lint:${GOLINT_VERSION}
  extends: .gocache
  script:
    - "! gofmt -l . | grep -q ."
    - golangci-lint run --timeout 5m0s

test:
  stage: test
  image: golang:${GOLANG_VERSION}
  needs: [build]
  extends: .gocache
  when: manual
  before_script:
    - go get github.com/boumenot/gocover-cobertura
  script:
    - go test -v -coverpkg=github.com/flare-foundation/tee-node/... -coverprofile=${COVERAGE_FILE} -covermode count ./internal/... ./pkg/...
    - go tool cover -func=${COVERAGE_FILE}
    - go run github.com/boumenot/gocover-cobertura < ${COVERAGE_FILE} > ${COBERTURA_FILE}
  artifacts:
    paths:
      - ${COVERAGE_FILE}
    reports:
      coverage_report:
        coverage_format: cobertura
        path: ${COBERTURA_FILE}
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'

include:
  # CONTAINER IMAGE RELEASE COMPONENT
  - component: gitlab.com/flarenetwork/ci-components-private/release-image@2
    inputs:
      image_name: "tee-node"
      image_tag_source: "commit_tag"